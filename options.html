<!DOCTYPE html>
<html>
<head>
  <title>Extension Options</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f8f9fa; color: #202122; max-width: 500px; margin: 0 auto; }
    h2 { border-bottom: 1px solid #a2a9b1; padding-bottom: 10px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; }
    input[type="text"], input[type="password"] { width: 100%; padding: 8px; border: 1px solid #a2a9b1; border-radius: 4px; box-sizing: border-box; }
    button { background: #3366cc; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:hover { background: #2a4b8d; }
    .status { margin-top: 10px; color: #4caf50; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Systematic Learning Settings</h2>
  <div class="form-group">
    <label for="gemini-api-key">Google Gemini API Key</label>
    <input type="password" id="gemini-api-key" placeholder="Enter your API key">
    <small style="color: #54595d; display: block; margin-top: 5px;">This key is stored securely in your browser and is only used to generate quiz questions.</small>
  </div>
  <button id="save-btn">Save Settings</button>
  <div id="status" class="status"></div>
  <script src="options.js"></script>
</body>
</html>
