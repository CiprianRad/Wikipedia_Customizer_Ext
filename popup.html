<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wikipedia Customizer</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="header">
    <div class="header-icon">W</div>
    <h1>Wiki Customizer</h1>
  </div>
  
  <div class="controls">
    <label class="toggle-container">
      <span class="label-text">Left Sidebar Navigation</span>
      <input type="checkbox" id="toggle-left-sidebar">
      <span class="slider"></span>
    </label>

    <label class="toggle-container">
      <span class="label-text">Fundraising Banners</span>
      <input type="checkbox" id="toggle-banners">
      <span class="slider"></span>
    </label>

    <label class="toggle-container">
      <span class="label-text">Right Sidebar (Tools)</span>
      <input type="checkbox" id="toggle-right-sidebar">
      <span class="slider"></span>
    </label>

    <label class="toggle-container">
      <span class="label-text">Top Header Bar</span>
      <input type="checkbox" id="toggle-top-header">
      <span class="slider"></span>
    </label>

    <label class="toggle-container">
      <span class="label-text">Bottom Footer Info</span>
      <input type="checkbox" id="toggle-bottom-info">
      <span class="slider"></span>
    </label>

    <label class="toggle-container">
      <span class="label-text">References & Notes</span>
      <input type="checkbox" id="toggle-refs-links">
      <span class="slider"></span>
    </label>

    <label class="toggle-container">
      <span class="label-text">See Also Section</span>
      <input type="checkbox" id="toggle-see-also">
      <span class="slider"></span>
    </label>

    <label class="toggle-container">
      <span class="label-text">Categories</span>
      <input type="checkbox" id="toggle-categories">
      <span class="slider"></span>
    </label>

    <div class="separator" style="height: 1px; background: #e0e0e0; margin: 12px 0;"></div>

    <label class="toggle-container" style="margin-top: 4px;">
      <span class="label-text" style="font-weight: 600; color: #2c3e50;">Systematic Learning</span>
      <input type="checkbox" id="toggle-quiz-mode">
      <span class="slider" style="background-color: #ccc;"></span>
    </label>
  </div>

  <script src="popup.js"></script>
</body>
</html>
